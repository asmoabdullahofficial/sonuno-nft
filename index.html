<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonuno NFT - Live Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white selection:bg-blue-500">
    <nav class="p-6 flex justify-between items-center border-b border-white/10 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-3xl font-black tracking-tighter text-blue-500">SONUNO<span class="text-white">NFT</span></h1>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-700 px-8 py-2 rounded-full font-bold transition-all transform hover:scale-105 active:scale-95">Connect Wallet</button>
    </nav>

    <div class="container mx-auto px-6 py-20 text-center">
        <h2 class="text-6xl md:text-8xl font-black mb-6 uppercase leading-none">The Future of <br><span class="text-blue-500 italic">Intelligent</span> NFTs</h2>
        <p class="text-gray-400 max-w-2xl mx-auto text-lg">7 Unique Artworks. 100 Supply Each. Powered by GenLayer.</p>
    </div>

    <div class="container mx-auto px-6 pb-20">
        <div id="nft-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <script>
        const contractAddress = "0x289ecc7c44b8592f27c2e80112fd34aaaa8c6dc6a81a9fe22c66749ce6617116";
        
        const nfts = [
            { id: 1, name: "Sonuno Genesis", price: "FREE", date: new Date("2026-03-25"), img: "images/1.PNG" },
            { id: 2, name: "Sonuno Mystic", price: "0.5 GEN", date: new Date("2026-04-25"), img: "images/2.PNG" },
            { id: 3, name: "Sonuno Eternal", price: "1.0 GEN", date: new Date("2026-05-25"), img: "images/3.PNG" },
            { id: 4, name: "Sonuno Legend", price: "1.5 GEN", date: new Date("2026-06-25"), img: "images/4.PNG" },
            { id: 5, name: "Sonuno Dream", price: "2.0 GEN", date: new Date("2026-07-25"), img: "images/5.PNG" },
            { id: 6, name: "Sonuno Future", price: "2.5 GEN", date: new Date("2026-08-25"), img: "images/6.png" },
            { id: 7, name: "Sonuno Infinity", price: "3.0 GEN", date: new Date("2026-09-25"), img: "images/7.PNG" }
        ];

        const grid = document.getElementById('nft-grid');
        const now = new Date();

        nfts.forEach(nft => {
            const isLive = now >= nft.date;
            const buttonText = isLive ? "Mint Now" : `Starts ${nft.date.toDateString().slice(4, 10)}`;
            const buttonClass = isLive 
                ? "bg-white text-black hover:bg-blue-500 hover:text-white" 
                : "bg-gray-800 text-gray-500 cursor-not-allowed";

            grid.innerHTML += `
                <div class="bg-white/5 rounded-3xl overflow-hidden border border-white/10 hover:border-blue-500/50 transition-all group">
                    <div class="relative overflow-hidden">
                        <img src="${nft.img}" alt="${nft.name}" class="w-full h-80 object-cover ${isLive ? '' : 'grayscale'} transition-duration-500">
                        <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-4 py-1 rounded-full text-xs font-bold border border-white/20">Supply: 100</div>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-end mb-6">
                            <div>
                                <h3 class="text-2xl font-bold">${nft.name}</h3>
                                <p class="text-blue-400 text-sm font-semibold uppercase italic tracking-widest">${isLive ? 'Live Now' : 'Upcoming'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-500 uppercase">Price</p>
                                <p class="text-xl font-black">${nft.price}</p>
                            </div>
                        </div>
                        <button onclick="${isLive ? `mintNFT(${nft.id})` : ''}" class="w-full font-black py-4 rounded-2xl transition-all uppercase tracking-widest ${buttonClass}">
                            ${buttonText}
                        </button>
                    </div>
                </div>
            `;
        });

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('connectBtn').innerText = accounts[0].slice(0, 6) + "... Connected";
                    document.getElementById('connectBtn').classList.replace('bg-blue-600', 'bg-green-600');
                } catch (e) { console.error(e); }
            } else {
                alert("Please install GenLayer Wallet/MetaMask!");
            }
        }

        async function mintNFT(id) {
            if (!window.ethereum) return alert("Connect wallet first!");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                alert("Minting Collection #" + id + "... Confirm in your wallet.");
                
                // Using eth_sendTransaction directly for GenLayer compatibility
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: accounts[0],
                        to: contractAddress,
                        data: '0x6a6278d1' + id.toString(16).padStart(64, '0')
                    }],
                });
                alert("Transaction Sent! Hash: " + txHash);
            } catch (err) {
                alert("Error: " + (err.message || "Failed to mint"));
            }
        }
    </script>
</body>
</html>
