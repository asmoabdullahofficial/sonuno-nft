<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonuno NFT Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tighter text-blue-500">SONUNO-NFT</h1>
        <button id="connectWallet" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-semibold transition">Connect Wallet</button>
    </nav>

    <div class="container mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-extrabold mb-4">Exclusive GenLayer Collections</h2>
            <p class="text-gray-400">Mint your unique intelligent NFTs on the Bradbury Testnet.</p>
        </div>

        <div id="nft-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const contractAddress = "0x289ecc7c44b8592f27c2e80112fd34aaaa8c6dc6a81a9fe22c66749ce6617116";
        const nfts = [
            { id: 1, name: "Sonuno Genesis", price: "Free", date: "Mar 25 - Apr 25" },
            { id: 2, name: "Sonuno Mystic", price: "0.5 GEN", date: "Apr 25 - May 25" },
            { id: 3, name: "Sonuno Eternal", price: "1.0 GEN", date: "May 25 - Jun 25" },
            { id: 4, name: "Sonuno Legend", price: "1.5 GEN", date: "Jun 25 - Jul 25" },
            { id: 5, name: "Sonuno Dream", price: "2.0 GEN", date: "Jul 25 - Aug 25" },
            { id: 6, name: "Sonuno Future", price: "2.5 GEN", date: "Aug 25 - Sep 25" },
            { id: 7, name: "Sonuno Infinity", price: "3.0 GEN", date: "Sep 25 - Oct 25" }
        ];

        const grid = document.getElementById('nft-grid');
        nfts.forEach(nft => {
            grid.innerHTML += `
                <div class="bg-gray-800 rounded-2xl overflow-hidden border border-gray-700 hover:border-blue-500 transition duration-300">
                    <div class="h-64 bg-gray-700 flex items-center justify-center text-gray-500 italic">
                        [NFT Image ${nft.id}]
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-xl font-bold">${nft.name}</h3>
                            <span class="text-blue-400 font-mono text-sm">${nft.price}</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-4">Minting: ${nft.date}</p>
                        <button onclick="mint(${nft.id})" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition">Mint Now</button>
                    </div>
                </div>
            `;
        });

        async function mint(id) {
            alert("Minting " + id + " on GenLayer... (Connecting to SDK)");
        }
    </script>
</body>
</html>
